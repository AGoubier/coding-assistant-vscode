<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Constellation of coding assistants: central hub with orbiting nodes -->
  <!-- Center hub -->
  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="12" cy="12" r="1" fill="currentColor"/>
  <!-- Orbiting tool nodes -->
  <circle cx="12" cy="4" r="1.5" fill="currentColor"/>
  <circle cx="18.9" cy="8" r="1.5" fill="currentColor"/>
  <circle cx="18.9" cy="16" r="1.5" fill="currentColor"/>
  <circle cx="12" cy="20" r="1.5" fill="currentColor"/>
  <circle cx="5.1" cy="16" r="1.5" fill="currentColor"/>
  <circle cx="5.1" cy="8" r="1.5" fill="currentColor"/>
  <!-- Connection lines -->
  <line x1="12" y1="9" x2="12" y2="5.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="14.6" y1="10.5" x2="17.5" y2="9" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="14.6" y1="13.5" x2="17.5" y2="15" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="12" y1="15" x2="12" y2="18.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="9.4" y1="13.5" x2="6.5" y2="15" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="9.4" y1="10.5" x2="6.5" y2="9" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
</svg>
