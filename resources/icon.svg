<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#shine)"/>
  <!-- Central hub: constellation of coding assistants -->
  <!-- Center star node -->
  <circle cx="64" cy="64" r="14" fill="#ffffff" opacity="0.95"/>
  <circle cx="64" cy="64" r="8" fill="url(#bg)"/>
  <!-- Orbiting tool nodes -->
  <circle cx="64" cy="28" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="95" cy="46" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="95" cy="82" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="64" cy="100" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="33" cy="82" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="33" cy="46" r="8" fill="#ffffff" opacity="0.9"/>
  <!-- Connection lines from center to nodes -->
  <line x1="64" y1="50" x2="64" y2="36" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="75" y1="55" x2="88" y2="48" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="75" y1="73" x2="88" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="64" y1="78" x2="64" y2="92" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="53" y1="73" x2="40" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="53" y1="55" x2="40" y2="48" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Tiny sparkle accents -->
  <circle cx="50" cy="35" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="82" cy="35" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="102" cy="64" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="82" cy="93" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="50" cy="93" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="26" cy="64" r="2" fill="#ffffff" opacity="0.4"/>
  <!-- Inner symbols on orbiting nodes: code brackets -->
  <text x="64" y="32" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#6366f1">&lt;/&gt;</text>
  <text x="95" y="50" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#6366f1">{ }</text>
  <text x="95" y="86" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#6366f1">AI</text>
  <text x="64" y="104" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#6366f1">fn</text>
  <text x="33" y="86" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#6366f1">#</text>
  <text x="33" y="50" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#6366f1">*</text>
  <!-- Center icon: lightning bolt for "awesome" -->
  <path d="M67 57 L61 65 L66 65 L61 72 L68 63 L63 63 Z" fill="#ffffff" opacity="0.95"/>
</svg>
